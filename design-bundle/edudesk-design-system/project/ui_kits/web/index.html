<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduDesk — Web UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'DM Sans',sans-serif;background:#111827;color:#fff;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── TOKENS ── */
const C = {
  bg: '#111827', bgAlt: '#0f1724', card: '#1f2937',
  border: 'rgba(255,255,255,0.08)', borderFocus: '#6366f1',
  inputBg: 'rgba(255,255,255,0.05)',
  indigo500: '#6366f1', indigo400: '#818cf8', indigo300: '#a5b4fc',
  teal500: '#14b8a6', teal300: '#5eead4',
  gray400: '#9ca3af', gray500: '#6b7280', gray600: '#4b5563', gray700: '#374151',
  green: '#22c55e', yellow: '#eab308', red: '#ef4444', amber: '#fbbf24',
};

/* ── SHARED COMPONENTS ── */
function Logo({size='md'}) {
  const s = size === 'sm' ? {mark:28,text:'0.9rem'} : {mark:34,text:'1.1rem'};
  return (
    <a href="#" style={{display:'flex',alignItems:'center',gap:10,textDecoration:'none'}} onClick={e=>e.preventDefault()}>
      <div style={{width:s.mark,height:s.mark,background:'linear-gradient(135deg,#6366f1,#818cf8)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:s.mark*0.4,color:'#fff',flexShrink:0}}>Ed</div>
      <span style={{fontSize:s.text,fontWeight:700,color:'#fff'}}>EduDesk</span>
    </a>
  );
}

function Badge({children, variant='indigo'}) {
  const variants = {
    indigo:{bg:'rgba(99,102,241,0.15)',color:'#a5b4fc',border:'rgba(99,102,241,0.25)'},
    teal:{bg:'rgba(20,184,166,0.12)',color:'#5eead4',border:'rgba(20,184,166,0.25)'},
    gold:{bg:'rgba(234,179,8,0.15)',color:'#fde047',border:'rgba(234,179,8,0.25)'},
    blue:{bg:'rgba(59,130,246,0.15)',color:'#93c5fd',border:'rgba(59,130,246,0.25)'},
    green:{bg:'rgba(34,197,94,0.12)',color:'#86efac',border:'rgba(34,197,94,0.25)'},
    red:{bg:'rgba(239,68,68,0.12)',color:'#fca5a5',border:'rgba(239,68,68,0.25)'},
    gray:{bg:'rgba(107,114,128,0.15)',color:'#d1d5db',border:'rgba(107,114,128,0.25)'},
    amber:{bg:'rgba(180,83,9,0.2)',color:'#fbbf24',border:'rgba(180,83,9,0.3)'},
  };
  const v = variants[variant]||variants.indigo;
  return <span style={{display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:999,fontSize:11,fontWeight:600,background:v.bg,color:v.color,border:`1px solid ${v.border}`}}>{children}</span>;
}

function Btn({children,variant='primary',size='md',onClick,style={}}) {
  const [hov,setHov]=useState(false);
  const base={fontFamily:'DM Sans,sans-serif',fontWeight:600,border:'none',cursor:'pointer',transition:'all 0.15s',borderRadius:8,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6};
  const sizes={sm:{padding:'7px 14px',fontSize:13},md:{padding:'10px 20px',fontSize:14},lg:{padding:'13px 26px',fontSize:15}};
  const variants={
    primary:{background:hov?C.indigo400:C.indigo500,color:'#fff',boxShadow:hov?'0 6px 20px rgba(99,102,241,0.35)':'none'},
    ghost:{background:hov?'rgba(255,255,255,0.07)':'transparent',color:'#fff',border:'1px solid rgba(255,255,255,0.18)'},
    teal:{background:hov?'rgba(20,184,166,0.25)':'rgba(20,184,166,0.15)',color:C.teal300,border:'1px solid rgba(20,184,166,0.3)'},
  };
  return <button style={{...base,...sizes[size],...variants[variant],...style}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}>{children}</button>;
}

function Input({placeholder,type='text',value,onChange}) {
  const [focused,setFocused]=useState(false);
  return <input type={type} placeholder={placeholder} value={value} onChange={onChange}
    style={{width:'100%',background:focused?'rgba(99,102,241,0.05)':C.inputBg,border:`1px solid ${focused?C.indigo500:C.border}`,borderRadius:8,padding:'11px 14px',color:'#fff',fontFamily:'DM Sans,sans-serif',fontSize:14,outline:'none',transition:'border-color 0.15s'}}
    onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}/>;
}

function Avatar({initials,size=40,gradient='135deg,#6366f1,#818cf8'}) {
  return <div style={{width:size,height:size,borderRadius:999,background:`linear-gradient(${gradient})`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*0.38,color:'#fff',flexShrink:0}}>{initials}</div>;
}

/* ── SCREENS ── */

function LandingScreen({navigate}) {
  return (
    <div style={{height:'100%',overflowY:'auto',background:C.bg}}>
      {/* Header */}
      <header style={{position:'sticky',top:0,zIndex:10,height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 2rem',borderBottom:`1px solid ${C.border}`,background:'rgba(17,24,39,0.92)',backdropFilter:'blur(12px)'}}>
        <Logo/>
        <div style={{display:'flex',gap:8}}>
          <Btn variant="ghost" size="sm" onClick={()=>navigate('signin')}>Sign in</Btn>
          <Btn size="sm" onClick={()=>navigate('signup')}>Get started</Btn>
        </div>
      </header>

      {/* Hero */}
      <div style={{textAlign:'center',padding:'80px 2rem 60px',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,0.18),transparent)',pointerEvents:'none'}}/>
        <div style={{position:'relative',maxWidth:700,margin:'0 auto'}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'5px 14px',borderRadius:999,background:'rgba(99,102,241,0.12)',border:'1px solid rgba(99,102,241,0.28)',fontSize:12,fontWeight:600,color:C.indigo300,marginBottom:24}}>
            <span style={{width:6,height:6,background:C.indigo500,borderRadius:99}}/>Academic Writing Marketplace
          </div>
          <h1 style={{fontSize:'clamp(2rem,5vw,3.5rem)',fontWeight:700,letterSpacing:'-0.03em',lineHeight:1.1,marginBottom:16}}>
            Where students find <span style={{background:'linear-gradient(135deg,#a5b4fc,#6366f1)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>expert writers</span>, not shortcuts
          </h1>
          <p style={{fontSize:16,color:C.gray400,maxWidth:500,margin:'0 auto 28px',lineHeight:1.65}}>Post your assignment, receive competitive bids from verified writers, and pay only when you're satisfied.</p>
          <div style={{display:'flex',gap:10,justifyContent:'center',flexWrap:'wrap'}}>
            <Btn size="lg" onClick={()=>navigate('signup')}>Post an order free</Btn>
            <Btn variant="ghost" size="lg" onClick={()=>navigate('signup')}>Apply as a writer</Btn>
          </div>
          <div style={{display:'flex',gap:'3rem',justifyContent:'center',marginTop:48,paddingTop:32,borderTop:`1px solid ${C.border}`,flexWrap:'wrap'}}>
            {[['10,000+','Orders completed'],['2,400+','Verified writers'],['98%','Satisfaction rate'],['50+','Subjects covered']].map(([n,l])=>(
              <div key={l} style={{textAlign:'center'}}>
                <div style={{fontSize:'1.75rem',fontWeight:700,letterSpacing:'-0.03em'}}>{n}</div>
                <div style={{fontSize:11,color:C.gray500,marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function SignInScreen({navigate}) {
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [loading,setLoading]=useState(false);
  const handle = (e) => {
    e.preventDefault();
    setLoading(true);
    setTimeout(()=>{
      setLoading(false);
      navigate(email.includes('writer') ? 'writer-dashboard' : 'student-dashboard');
    },900);
  };
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      <header style={{height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 2rem',borderBottom:`1px solid ${C.border}`}}>
        <Logo size="sm"/>
        <button onClick={()=>navigate('signup')} style={{background:'none',border:'none',color:C.indigo400,fontSize:13,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>No account? Sign up free →</button>
      </header>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'-20%',left:'50%',transform:'translateX(-50%)',width:500,height:320,background:'radial-gradient(rgba(99,102,241,0.12),transparent 70%)',pointerEvents:'none'}}/>
        <div style={{width:'100%',maxWidth:380,position:'relative'}}>
          <div style={{marginBottom:28}}>
            <h1 style={{fontSize:'1.5rem',fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>Welcome back</h1>
            <p style={{fontSize:13,color:C.gray500}}>Sign in to your EduDesk account</p>
          </div>
          <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:C.gray400,marginBottom:5}}>Email address</label>
              <Input type="email" placeholder="jane@university.edu" value={email} onChange={e=>setEmail(e.target.value)}/>
            </div>
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <label style={{fontSize:11,fontWeight:600,color:C.gray400}}>Password</label>
                <a href="#" onClick={e=>e.preventDefault()} style={{fontSize:11,color:C.gray500,textDecoration:'none'}}>Forgot?</a>
              </div>
              <Input type="password" placeholder="Your password" value={pw} onChange={e=>setPw(e.target.value)}/>
            </div>
            <div style={{height:1,background:C.border,margin:'4px 0'}}/>
            <Btn size="lg" style={{width:'100%',opacity:loading?0.7:1}}>
              {loading ? 'Signing in…' : 'Sign in'}
            </Btn>
          </form>
          <p style={{textAlign:'center',fontSize:12,color:C.gray600,marginTop:16}}>Don't have an account? <span style={{color:C.indigo400,cursor:'pointer'}} onClick={()=>navigate('signup')}>Create one free</span></p>
          <p style={{textAlign:'center',fontSize:11,color:C.gray700,marginTop:8}}>Tip: type "writer" in email to go to Writer Dashboard</p>
        </div>
      </div>
    </div>
  );
}

function SignUpScreen({navigate}) {
  const [role,setRole]=useState('student');
  const [done,setDone]=useState(false);

  if(done) return (
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:C.bg,flexDirection:'column',gap:16,textAlign:'center',padding:'2rem'}}>
      <div style={{width:56,height:56,background:'rgba(34,197,94,0.12)',border:'1px solid rgba(34,197,94,0.25)',borderRadius:99,display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#86efac" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 style={{fontWeight:700,letterSpacing:'-0.02em'}}>{role==='writer'?'Application submitted!':'Welcome to EduDesk!'}</h2>
      <p style={{fontSize:13,color:C.gray500,maxWidth:340}}>{role==='writer'?'Your writer application is under review. We'll email you once approved.':'Your account is ready. Start posting orders.'}</p>
      <Btn onClick={()=>navigate(role==='writer'?'writer-dashboard':'student-dashboard')}>Go to dashboard</Btn>
    </div>
  );

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      <header style={{height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 2rem',borderBottom:`1px solid ${C.border}`}}>
        <Logo size="sm"/>
        <button onClick={()=>navigate('signin')} style={{background:'none',border:'none',color:C.indigo400,fontSize:13,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Already have an account? Sign in</button>
      </header>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',overflowY:'auto'}}>
        <div style={{width:'100%',maxWidth:440}}>
          {/* Role toggle */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:24}}>
            {[['student','I\'m a Student','Post orders, review bids'],['writer','I\'m a Writer','Bid on orders, earn']].map(([r,title,desc])=>(
              <button key={r} onClick={()=>setRole(r)} style={{padding:'1.125rem 1rem',borderRadius:12,background:role===r?(r==='writer'?'rgba(20,184,166,0.08)':'rgba(99,102,241,0.1)'):'rgba(255,255,255,0.04)',border:`1.5px solid ${role===r?(r==='writer'?'#14b8a6':'#6366f1'):'rgba(255,255,255,0.09)'}`,cursor:'pointer',textAlign:'left',position:'relative',transition:'all 0.2s'}}>
                <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:3}}>{title}</div>
                <div style={{fontSize:11,color:C.gray500}}>{desc}</div>
                {role===r && <div style={{position:'absolute',top:10,right:10,width:18,height:18,borderRadius:99,background:r==='writer'?C.teal500:C.indigo500,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" strokeWidth="2.5"><polyline points="2 6 5 9 10 3"/></svg>
                </div>}
              </button>
            ))}
          </div>

          {role==='writer' && (
            <div style={{background:'rgba(20,184,166,0.08)',border:'1px solid rgba(20,184,166,0.2)',borderRadius:10,padding:'12px 14px',marginBottom:18,display:'flex',gap:10,alignItems:'flex-start'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5eead4" strokeWidth="1.8" style={{flexShrink:0,marginTop:1}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <div style={{fontSize:11,color:'#5eead4',lineHeight:1.5}}><strong>Writers go through an approval process</strong> — you'll complete an onboarding form, then our team reviews before you can start bidding.</div>
            </div>
          )}

          <h2 style={{fontSize:'1.35rem',fontWeight:700,letterSpacing:'-0.02em',marginBottom:18}}>{role==='student'?'Create your student account':'Apply as a writer'}</h2>

          <form onSubmit={e=>{e.preventDefault();setDone(true);}} style={{display:'flex',flexDirection:'column',gap:12}}>
            <Input placeholder="Full name"/>
            <Input type="email" placeholder="Email address"/>
            <Input type="password" placeholder="Password (min. 8 characters)"/>
            <Btn size="lg" variant={role==='writer'?'teal':'primary'} style={{width:'100%',marginTop:4}}>
              {role==='student'?'Create student account':'Submit writer application'}
            </Btn>
          </form>
          <p style={{textAlign:'center',fontSize:11,color:C.gray600,marginTop:14}}>By creating an account you agree to our Terms of Service.</p>
        </div>
      </div>
    </div>
  );
}

function StudentDashboard({navigate}) {
  const orders = [
    {id:'ORD-042',title:'Critical Analysis — Hamlet Act III',subject:'English Literature',status:'BIDDING',bids:4,price:'$45',deadline:'3 days'},
    {id:'ORD-039',title:'SWOT Analysis — Tesla Inc.',subject:'Business Administration',status:'IN_PROGRESS',bids:1,price:'$80',deadline:'1 day'},
    {id:'ORD-031',title:'Annotated Bibliography — Climate Policy',subject:'Environmental Science',status:'COMPLETED',bids:0,price:'$55',deadline:'Done'},
  ];
  const statusVariant = {BIDDING:'blue',IN_PROGRESS:'indigo',COMPLETED:'green',OPEN:'blue'};
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      <header style={{height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 1.75rem',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <Logo size="sm"/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{position:'relative',cursor:'pointer'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.gray400} strokeWidth="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <div style={{position:'absolute',top:-2,right:-2,width:8,height:8,background:C.indigo500,borderRadius:99}}/>
          </div>
          <Avatar initials="JS" size={32}/>
          <Btn variant="ghost" size="sm" onClick={()=>navigate('landing')}>Sign out</Btn>
        </div>
      </header>
      <div style={{flex:1,overflowY:'auto',padding:'1.75rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
          <div>
            <h1 style={{fontSize:'1.4rem',fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>Student Dashboard</h1>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:13,color:C.gray400}}>Hello, Jane.</span>
              <Badge variant="gold">Gold</Badge>
              <Badge variant="indigo">Veteran</Badge>
            </div>
            <div style={{fontSize:11,color:C.gray500,marginTop:4}}>320 points · 80 to Platinum</div>
          </div>
          <Btn onClick={()=>navigate('new-order')}>+ New Order</Btn>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
          {['My Orders','Browse Writers','Leaderboard'].map(l=>(
            <Btn key={l} variant="ghost" size="sm">{l}</Btn>
          ))}
        </div>

        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.gray600,marginBottom:12}}>Recent Orders</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {orders.map(o=>(
            <div key={o.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px 18px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',cursor:'pointer',transition:'border-color 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(99,102,241,0.3)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{fontSize:13,fontWeight:600,color:'#fff',marginBottom:4}}>{o.title}</div>
                <div style={{fontSize:11,color:C.gray500}}>{o.subject} · {o.deadline}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                <Badge variant={statusVariant[o.status]||'gray'}>{o.status}</Badge>
                {o.bids > 0 && <span style={{fontSize:11,color:C.indigo400}}>{o.bids} bids</span>}
                <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>{o.price}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function WriterDashboard({navigate}) {
  const pool = [
    {id:'ORD-048',title:'Argumentative Essay — Universal Basic Income',subject:'Economics',pages:4,level:'Undergraduate',deadline:'2 days',minBid:'$32'},
    {id:'ORD-047',title:'Lab Report — Titration Experiment',subject:'Chemistry',pages:6,level:'Undergraduate',deadline:'4 days',minBid:'$48'},
    {id:'ORD-045',title:'Dissertation Chapter 2 — Literature Review',subject:'Psychology',pages:12,level:'Masters',deadline:'7 days',minBid:'$96'},
  ];
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      <header style={{height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 1.75rem',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <Logo size="sm"/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{position:'relative',cursor:'pointer'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.gray400} strokeWidth="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </div>
          <Avatar initials="JR" size={32} gradient="135deg,#14b8a6,#5eead4"/>
          <Btn variant="ghost" size="sm" onClick={()=>navigate('landing')}>Sign out</Btn>
        </div>
      </header>
      <div style={{flex:1,overflowY:'auto',padding:'1.75rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20,flexWrap:'wrap',gap:12}}>
          <div>
            <h1 style={{fontSize:'1.4rem',fontWeight:700,letterSpacing:'-0.02em',marginBottom:4}}>Writer Dashboard</h1>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:13,color:C.gray400}}>Hello, James.</span>
              <Badge variant="gold">Gold</Badge>
              <Badge variant="indigo">Veteran</Badge>
            </div>
            <div style={{fontSize:11,color:C.gray500,marginTop:4}}>420 points · Gold · 180 to Platinum</div>
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:24,flexWrap:'wrap'}}>
          {['Order Pool','My Orders','Earnings','Leaderboard'].map(l=>(
            <Btn key={l} variant={l==='Order Pool'?'primary':'ghost'} size="sm">{l}</Btn>
          ))}
        </div>

        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.gray600,marginBottom:12}}>Available Orders</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {pool.map(o=>(
            <div key={o.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px 18px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',cursor:'pointer'}}
              onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(20,184,166,0.3)'}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{fontSize:13,fontWeight:600,color:'#fff',marginBottom:4}}>{o.title}</div>
                <div style={{fontSize:11,color:C.gray500}}>{o.subject} · {o.level} · {o.pages} pages · {o.deadline}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:13,fontWeight:700,color:'#fff'}}>from {o.minBid}</span>
                <Btn variant="teal" size="sm">Place bid</Btn>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function NewOrderScreen({navigate}) {
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      <header style={{height:60,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 1.75rem',borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
        <Logo size="sm"/>
        <Btn variant="ghost" size="sm" onClick={()=>navigate('student-dashboard')}>← Back</Btn>
      </header>
      <div style={{flex:1,overflowY:'auto',padding:'1.75rem',display:'flex',justifyContent:'center'}}>
        <div style={{width:'100%',maxWidth:560}}>
          <h2 style={{fontSize:'1.3rem',fontWeight:700,letterSpacing:'-0.02em',marginBottom:6}}>Post a new order</h2>
          <p style={{fontSize:13,color:C.gray500,marginBottom:24}}>Fill in your assignment details and receive bids from verified writers.</p>
          <form style={{display:'flex',flexDirection:'column',gap:14}} onSubmit={e=>{e.preventDefault();navigate('student-dashboard');}}>
            {[['Subject','Select subject…'],['Service type','Select service type…'],['Academic level','Select level…'],['Citation style','Select citation style…']].map(([label,ph])=>(
              <div key={label}>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.gray400,marginBottom:5}}>{label}</label>
                <select style={{width:'100%',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,padding:'11px 14px',color:C.gray400,fontFamily:'DM Sans,sans-serif',fontSize:14,outline:'none'}}>
                  <option>{ph}</option>
                </select>
              </div>
            ))}
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:C.gray400,marginBottom:5}}>Topic / Title</label>
              <Input placeholder="e.g. Critical Analysis of Hamlet Act III"/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:C.gray400,marginBottom:5}}>Instructions</label>
              <textarea placeholder="Describe your assignment in detail (minimum 50 characters)…" style={{width:'100%',background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:8,padding:'11px 14px',color:'#fff',fontFamily:'DM Sans,sans-serif',fontSize:14,outline:'none',resize:'none',height:100}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.gray400,marginBottom:5}}>Number of pages</label>
                <Input placeholder="e.g. 5"/>
              </div>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:C.gray400,marginBottom:5}}>Preferred deadline</label>
                <Input type="date"/>
              </div>
            </div>
            <Btn size="lg" style={{width:'100%',marginTop:8}}>Post order</Btn>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── APP SHELL ── */
const SCREENS = {
  landing: LandingScreen,
  signin: SignInScreen,
  signup: SignUpScreen,
  'student-dashboard': StudentDashboard,
  'writer-dashboard': WriterDashboard,
  'new-order': NewOrderScreen,
};

function App() {
  const [screen, setScreen] = useState('landing');
  const Screen = SCREENS[screen] || LandingScreen;
  return (
    <div style={{height:'100%',position:'relative'}}>
      <Screen navigate={setScreen}/>
      {/* Nav pills */}
      <div style={{position:'fixed',bottom:16,left:'50%',transform:'translateX(-50%)',display:'flex',gap:4,background:'rgba(17,24,39,0.92)',backdropFilter:'blur(12px)',border:`1px solid ${C.border}`,borderRadius:999,padding:'5px 8px',zIndex:50}}>
        {[['landing','Home'],['signin','Sign In'],['signup','Sign Up'],['student-dashboard','Student'],['writer-dashboard','Writer'],['new-order','New Order']].map(([s,l])=>(
          <button key={s} onClick={()=>setScreen(s)} style={{padding:'5px 12px',borderRadius:999,fontSize:11,fontWeight:600,border:'none',cursor:'pointer',transition:'all 0.15s',background:screen===s?C.indigo500:'transparent',color:screen===s?'#fff':C.gray500,fontFamily:'DM Sans,sans-serif'}}>{l}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
