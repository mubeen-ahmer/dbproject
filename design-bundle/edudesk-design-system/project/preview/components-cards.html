<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#111827;padding:20px;display:flex;gap:12px;flex-wrap:wrap}

/* Writer profile card */
.writer-card{background:#1f2937;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:20px;width:220px}
.wc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.wc-avatar{width:40px;height:40px;border-radius:99px;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex-shrink:0}
.wc-name{font-size:14px;font-weight:600;color:#fff}
.wc-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-flex;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.gold{background:rgba(234,179,8,0.15);color:#fde047;border:1px solid rgba(234,179,8,0.25)}
.veteran{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.25)}
.wc-stars{display:flex;gap:2px;margin-bottom:8px}
.star{color:#fbbf24;font-size:12px}
.wc-meta{font-size:11px;color:#6b7280;margin-bottom:12px}
.wc-btn{width:100%;padding:8px;border-radius:7px;background:#6366f1;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}

/* Order card */
.order-card{background:#1f2937;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px;width:280px}
.oc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.oc-title{font-size:14px;font-weight:600;color:#fff;line-height:1.3}
.st-open{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25);display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.st-done{background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.25);display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.oc-meta{font-size:11px;color:#6b7280;margin-bottom:12px;line-height:1.6}
.oc-footer{display:flex;justify-content:space-between;align-items:center}
.oc-price{font-size:15px;font-weight:700;color:#fff}
.oc-link{font-size:11px;color:#818cf8;text-decoration:none}

/* Notification card */
.notif{background:#1f2937;border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:14px 16px;width:260px;display:flex;gap:10px;align-items:flex-start}
.notif-dot{width:8px;height:8px;background:#6366f1;border-radius:99px;margin-top:5px;flex-shrink:0}
.notif-text{font-size:12px;color:#9ca3af;line-height:1.5}
.notif-text strong{color:#fff;font-weight:600}
.notif-time{font-size:10px;color:#4b5563;margin-top:3px}
</style></head><body>

<div class="writer-card">
  <div class="wc-top">
    <div class="wc-avatar">JR</div>
    <div>
      <div class="wc-name">James R.</div>
      <div class="wc-badges">
        <span class="badge gold">Gold</span>
        <span class="badge veteran">Veteran</span>
      </div>
    </div>
  </div>
  <div class="wc-stars">
    <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
    <span style="font-size:11px;color:#6b7280;margin-left:4px">4.9 (64 reviews)</span>
  </div>
  <div class="wc-meta">Psychology · Sociology<br>82 completed orders</div>
  <button class="wc-btn">Select this writer</button>
</div>

<div style="display:flex;flex-direction:column;gap:10px">
  <div class="order-card">
    <div class="oc-header">
      <div class="oc-title">Critical Analysis — Hamlet Act III</div>
      <span class="st-open">BIDDING</span>
    </div>
    <div class="oc-meta">English Literature · Essay<br>Undergraduate · APA · 5 pages<br>Deadline: 3 days</div>
    <div class="oc-footer">
      <span class="oc-price">$45 <span style="font-size:11px;font-weight:400;color:#6b7280">min bid</span></span>
      <a class="oc-link" href="#">View bids (4) →</a>
    </div>
  </div>

  <div class="notif">
    <div class="notif-dot"></div>
    <div>
      <div class="notif-text"><strong>James R.</strong> submitted your paper for review.</div>
      <div class="notif-time">2 minutes ago</div>
    </div>
  </div>
</div>

</body></html>
