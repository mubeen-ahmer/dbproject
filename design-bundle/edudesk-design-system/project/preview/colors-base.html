<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',ui-sans-serif,sans-serif;background:#111827;padding:20px;display:flex;flex-wrap:wrap;gap:12px}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
.swatch-row{display:flex;gap:8px;flex-wrap:wrap}
.swatch{display:flex;flex-direction:column;align-items:center;gap:6px}
.swatch-block{width:60px;height:60px;border-radius:10px;border:1px solid rgba(255,255,255,0.08)}
.swatch-label{font-size:10px;color:#6b7280;font-family:monospace;text-align:center;line-height:1.3}
.group-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#4b5563;margin-bottom:8px;margin-top:4px}
section{width:100%}
</style></head><body>
<section>
  <div class="group-label">Background</div>
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-block" style="background:#030712;border:1px solid rgba(255,255,255,0.12)"></div><div class="swatch-label">gray-950<br>#030712</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#111827"></div><div class="swatch-label">gray-900<br>#111827</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#0f1724"></div><div class="swatch-label">alt-bg<br>#0f1724</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#1f2937"></div><div class="swatch-label">gray-800<br>#1f2937</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#374151"></div><div class="swatch-label">gray-700<br>#374151</div></div>
  </div>
</section>
<section>
  <div class="group-label">Text</div>
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-block" style="background:#ffffff"></div><div class="swatch-label">white<br>#ffffff</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#d1d5db"></div><div class="swatch-label">gray-300<br>#d1d5db</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#9ca3af"></div><div class="swatch-label">gray-400<br>#9ca3af</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#6b7280"></div><div class="swatch-label">gray-500<br>#6b7280</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#4b5563"></div><div class="swatch-label">gray-600<br>#4b5563</div></div>
  </div>
</section>
<section>
  <div class="group-label">Primary — Indigo</div>
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-block" style="background:#4f46e5"></div><div class="swatch-label">indigo-600<br>#4f46e5</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#6366f1"></div><div class="swatch-label">indigo-500<br>#6366f1</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#818cf8"></div><div class="swatch-label">indigo-400<br>#818cf8</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#a5b4fc"></div><div class="swatch-label">indigo-300<br>#a5b4fc</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#c7d2fe"></div><div class="swatch-label">indigo-200<br>#c7d2fe</div></div>
  </div>
</section>
</body></html>
