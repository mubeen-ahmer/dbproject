/* ─── SHARED ─── */
function IconEl({children,size=18,stroke='currentColor',sw=1.8,viewBox='0 0 24 24',style={}}) {
  return <svg width={size} height={size} viewBox={viewBox} fill="none" stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={style}>{children}</svg>;
}
function Badge({children,variant='indigo',size='sm'}) {
  const map={
    indigo:{bg:'rgba(99,102,241,0.15)',color:'#a5b4fc',b:'rgba(99,102,241,0.25)'},
    teal:{bg:'rgba(20,184,166,0.12)',color:'#5eead4',b:'rgba(20,184,166,0.25)'},
    gold:{bg:'rgba(234,179,8,0.15)',color:'#fde047',b:'rgba(234,179,8,0.25)'},
    blue:{bg:'rgba(59,130,246,0.15)',color:'#93c5fd',b:'rgba(59,130,246,0.25)'},
    green:{bg:'rgba(34,197,94,0.12)',color:'#86efac',b:'rgba(34,197,94,0.25)'},
    red:{bg:'rgba(239,68,68,0.12)',color:'#fca5a5',b:'rgba(239,68,68,0.25)'},
    orange:{bg:'rgba(249,115,22,0.12)',color:'#fdba74',b:'rgba(249,115,22,0.25)'},
    gray:{bg:'rgba(107,114,128,0.15)',color:'#d1d5db',b:'rgba(107,114,128,0.25)'},
    amber:{bg:'rgba(180,83,9,0.2)',color:'#fbbf24',b:'rgba(180,83,9,0.3)'},
    purple:{bg:'rgba(168,85,247,0.15)',color:'#d8b4fe',b:'rgba(168,85,247,0.25)'},
  };
  const v=map[variant]||map.indigo;
  const p=size==='xs'?'2px 6px':'3px 9px'; const fs=size==='xs'?10:11;
  return <span style={{display:'inline-flex',alignItems:'center',padding:p,borderRadius:999,fontSize:fs,fontWeight:600,background:v.bg,color:v.color,border:`1px solid ${v.b}`,whiteSpace:'nowrap'}}>{children}</span>;
}
function statusBadge(status) {
  const map={OPEN:['blue','OPEN'],BIDDING:['blue','BIDDING'],ASSIGNED:['indigo','ASSIGNED'],IN_PROGRESS:['indigo','IN PROGRESS'],SUBMITTED:['gold','SUBMITTED'],UNDER_REVIEW:['gold','UNDER REVIEW'],REVISION_REQUESTED:['orange','REVISION'],COMPLETED:['green','COMPLETED'],DISPUTED:['red','DISPUTED'],CANCELLED:['gray','CANCELLED'],REFUNDED:['gray','REFUNDED']};
  const [v,l]=map[status]||['gray',status];
  return <Badge variant={v}>{l}</Badge>;
}
function Avatar({initials='?',size=36,gradient='135deg,#14b8a6,#5eead4'}) {
  return <div style={{width:size,height:size,borderRadius:999,background:`linear-gradient(${gradient})`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*0.38,color:'#fff',flexShrink:0,letterSpacing:'-0.02em'}}>{initials}</div>;
}

/* ─── CHAT ─── */
function ChatPanel({orderId,orderTitle,studentName,onClose}) {
  const [msgs,setMsgs]=useState(CHAT_MSGS);
  const [input,setInput]=useState('');
  const [warn,setWarn]=useState(false);
  const bottomRef=useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);
  const send=()=>{
    if(!input.trim()) return;
    const blocked=/\d{7,}|@[a-z]+\.[a-z]+|https?:\/\//i.test(input);
    if(blocked){setWarn(true);setTimeout(()=>setWarn(false),4000);return;}
    setMsgs(m=>[...m,{id:Date.now(),from:'writer',text:input,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]);
    setInput('');
  };
  return (
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'stretch',justifyContent:'flex-end'}}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(4px)'}} onClick={onClose}/>
      <div style={{position:'relative',width:420,background:T.sidebar,display:'flex',flexDirection:'column',borderLeft:`1px solid ${T.border}`,animation:'slideIn 0.25s ease'}}>
        <div style={{padding:'16px 20px',borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <Avatar initials={studentName.split(' ').map(x=>x[0]).join('').slice(0,2)} size={38} gradient="135deg,#6366f1,#818cf8"/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:600,color:T.fg1}}>{studentName}</div>
            <div style={{fontSize:11,color:T.green,display:'flex',alignItems:'center',gap:4,marginTop:1}}>
              <span style={{width:6,height:6,background:T.green,borderRadius:99}}/>Online
            </div>
          </div>
          <div style={{fontFamily:'DM Mono,monospace',fontSize:11,color:T.fg3,background:T.indigoFaint,border:'1px solid rgba(99,102,241,0.2)',borderRadius:6,padding:'3px 8px'}}>{orderId}</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.fg3,cursor:'pointer',padding:4}}>
            <IconEl><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconEl>
          </button>
        </div>
        <div style={{padding:'10px 20px',background:'rgba(99,102,241,0.06)',borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
          <div style={{fontSize:11,color:T.fg3}}>Order</div>
          <div style={{fontSize:12,fontWeight:600,color:T.fg2,marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{orderTitle}</div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'20px',display:'flex',flexDirection:'column',gap:14}}>
          {msgs.map(m=>(
            <div key={m.id} style={{display:'flex',flexDirection:m.from==='writer'?'row-reverse':'row',gap:8,alignItems:'flex-end'}}>
              {m.from==='student' && <Avatar initials={studentName.split(' ').map(x=>x[0]).join('').slice(0,2)} size={28} gradient="135deg,#6366f1,#818cf8"/>}
              <div style={{maxWidth:'75%'}}>
                {m.from==='student' && <div style={{fontSize:10,color:T.fg3,marginBottom:3,marginLeft:2}}>{m.name}</div>}
                <div style={{background:m.from==='writer'?T.teal:'rgba(255,255,255,0.06)',borderRadius:m.from==='writer'?'14px 14px 4px 14px':'14px 14px 14px 4px',padding:'10px 13px',fontSize:13,lineHeight:1.55,color:'#fff'}}>
                  {m.text}
                </div>
                <div style={{fontSize:10,color:T.fg4,marginTop:3,textAlign:m.from==='writer'?'right':'left'}}>{m.time}</div>
              </div>
            </div>
          ))}
          {warn && <div style={{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.25)',borderRadius:10,padding:'10px 13px',fontSize:12,color:'#fca5a5',lineHeight:1.5}}>⚠ Sharing contact info removes platform protection. Message not sent.</div>}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:'12px 16px',borderTop:`1px solid ${T.border}`,flexShrink:0}}>
          <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Type a message… (Enter to send)" rows={1} style={{flex:1,background:'rgba(255,255,255,0.05)',border:`1px solid ${T.borderMed}`,borderRadius:10,padding:'10px 13px',color:'#fff',fontSize:13,outline:'none',resize:'none',lineHeight:1.5,fontFamily:'DM Sans,sans-serif'}}/>
            <button onClick={send} style={{width:38,height:38,borderRadius:10,background:T.teal,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'background 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.background='#0d9488'} onMouseLeave={e=>e.currentTarget.style.background=T.teal}>
              <IconEl stroke="#fff"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconEl>
            </button>
          </div>
        </div>
      </div>
      <style>{`@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}`}</style>
    </div>
  );
}

/* ─── BID MODAL ─── */
function BidModal({order,onClose}) {
  const [price,setPrice]=useState('');
  const [deadline,setDeadline]=useState('');
  const [pitch,setPitch]=useState('');
  const [done,setDone]=useState(false);
  const inp={width:'100%',background:'rgba(255,255,255,0.05)',border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 13px',color:'#fff',fontSize:13,outline:'none'};
  if(done) return (
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(6px)'}}>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:'32px',textAlign:'center',maxWidth:360,width:'90%'}}>
        <div style={{width:56,height:56,background:'rgba(20,184,166,0.12)',border:'1px solid rgba(20,184,166,0.25)',borderRadius:99,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
          <IconEl stroke="#5eead4" size={26}><polyline points="20 6 9 17 4 12"/></IconEl>
        </div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>Bid placed!</div>
        <div style={{fontSize:13,color:T.fg3,lineHeight:1.5,marginBottom:20}}>Your bid of <strong style={{color:T.fg1}}>${price}</strong> has been submitted. You'll be notified if the student selects you.</div>
        <button onClick={onClose} style={{padding:'10px 24px',borderRadius:8,background:T.teal,color:'#fff',border:'none',fontSize:13,fontWeight:600,cursor:'pointer'}}>Done</button>
      </div>
    </div>
  );
  return (
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.6)',backdropFilter:'blur(6px)'}}>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:'28px',maxWidth:480,width:'90%',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:T.fg1,marginBottom:4}}>Place a bid</div>
            <div style={{fontSize:12,color:T.fg3,maxWidth:340,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{order.title}</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:T.fg3,cursor:'pointer'}}>
            <IconEl><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></IconEl>
          </button>
        </div>
        <div style={{background:'rgba(255,255,255,0.03)',border:`1px solid ${T.border}`,borderRadius:10,padding:'12px 14px',marginBottom:20,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[['Subject',order.subject],['Service',order.service],['Level',order.level],['Pages',`${order.pages} pages`],['Deadline',order.deadline],['Min bid',order.minBid]].map(([k,v])=>(
            <div key={k}><div style={{fontSize:10,color:T.fg4,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:1}}>{k}</div><div style={{fontSize:12,fontWeight:600,color:T.fg2}}>{v}</div></div>
          ))}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:T.fg3,marginBottom:5}}>Your price ($)</label>
              <input type="number" min={parseInt(order.minBid.replace('$',''))} value={price} onChange={e=>setPrice(e.target.value)} placeholder={order.minBid} style={inp} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/>
              <div style={{fontSize:10,color:T.fg4,marginTop:3}}>Min: {order.minBid}</div>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:600,color:T.fg3,marginBottom:5}}>Your deadline</label>
              <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} style={inp} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/>
            </div>
          </div>
          <div>
            <label style={{display:'block',fontSize:11,fontWeight:600,color:T.fg3,marginBottom:5}}>Pitch message</label>
            <textarea value={pitch} onChange={e=>setPitch(e.target.value)} placeholder="Tell the student why you're the best fit for this order…" rows={4} style={{...inp,resize:'none',fontFamily:'DM Sans,sans-serif',lineHeight:1.5}} onFocus={e=>e.target.style.borderColor=T.teal} onBlur={e=>e.target.style.borderColor=T.border}/>
          </div>
          <button onClick={()=>{if(price&&deadline&&pitch)setDone(true);}} style={{padding:'12px',borderRadius:8,background:T.teal,color:'#fff',border:'none',fontSize:14,fontWeight:600,cursor:'pointer'}}>Submit bid</button>
        </div>
      </div>
    </div>
  );
}

/* ─── NOTIFICATIONS ─── */
function NotificationsPage({notifs,markRead}) {
  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:12,color:T.fg3}}>{notifs.filter(n=>!n.read).length} unread</div>
        <button onClick={markRead} style={{background:'none',border:'none',color:T.teal,fontSize:12,cursor:'pointer',fontWeight:600}}>Mark all read</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {notifs.map(n=>(
          <div key={n.id} style={{background:n.read?T.card:'rgba(20,184,166,0.06)',border:`1px solid ${n.read?T.border:'rgba(20,184,166,0.2)'}`,borderRadius:12,padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start',transition:'all 0.2s'}}>
            <div style={{width:8,height:8,borderRadius:99,background:n.read?'transparent':T.teal,marginTop:5,flexShrink:0,border:n.read?`1px solid ${T.fg4}`:'none'}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:n.read?T.fg3:T.fg1,lineHeight:1.5}}>{n.text}</div>
              <div style={{fontSize:11,color:T.fg4,marginTop:4}}>{n.time}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── LEADERBOARD ─── */
function LeaderboardPage() {
  const tierV={Bronze:'amber',Silver:'gray',Gold:'gold',Platinum:'teal',Elite:'purple'};
  const tenureV={Veteran:'indigo','Half Year':'teal',Quarterly:'green','1 Month':'blue',New:'gray'};
  return (
    <div style={{flex:1,overflowY:'auto',padding:'24px'}}>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:`1px solid ${T.border}`,display:'grid',gridTemplateColumns:'40px 1fr 80px 70px 80px 80px',gap:12,fontSize:11,fontWeight:700,color:T.fg4,textTransform:'uppercase',letterSpacing:'0.06em'}}>
          <span>#</span><span>Writer</span><span style={{textAlign:'center'}}>Points</span><span style={{textAlign:'center'}}>Tier</span><span style={{textAlign:'center'}}>Orders</span><span style={{textAlign:'center'}}>Rating</span>
        </div>
        {LEADERBOARD.map(u=>(
          <div key={u.rank} style={{padding:'12px 20px',borderBottom:`1px solid ${T.border}`,display:'grid',gridTemplateColumns:'40px 1fr 80px 70px 80px 80px',gap:12,alignItems:'center',background:u.isMe?'rgba(20,184,166,0.07)':'transparent',transition:'background 0.15s'}}
            onMouseEnter={e=>{if(!u.isMe)e.currentTarget.style.background='rgba(255,255,255,0.02)';}}
            onMouseLeave={e=>{if(!u.isMe)e.currentTarget.style.background='transparent';}}>
            <div style={{fontSize:14,fontWeight:700,color:u.rank<=3?T.amber:T.fg4,textAlign:'center'}}>{u.rank<=3?['🥇','🥈','🥉'][u.rank-1]:u.rank}</div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <Avatar initials={u.name.split(' ').map(x=>x[0]).join('').slice(0,2)} size={32} gradient={u.isMe?'135deg,#14b8a6,#5eead4':'135deg,#374151,#4b5563'}/>
              <div>
                <div style={{fontSize:13,fontWeight:u.isMe?700:500,color:u.isMe?'#5eead4':T.fg1}}>{u.name}</div>
                <Badge variant={tenureV[u.tenure]||'gray'} size="xs">{u.tenure}</Badge>
              </div>
            </div>
            <div style={{fontSize:14,fontWeight:700,color:T.fg1,textAlign:'center'}}>{u.points.toLocaleString()}</div>
            <div style={{textAlign:'center'}}><Badge variant={tierV[u.tier]||'gray'} size="xs">{u.tier}</Badge></div>
            <div style={{fontSize:13,color:T.fg3,textAlign:'center'}}>{u.orders}</div>
            <div style={{fontSize:13,color:T.amber,textAlign:'center',fontWeight:600}}>{u.rating} ★</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [page,setPage]=useState('home');
  const [chat,setChat]=useState(null);
  const [bid,setBid]=useState(null);
  const [notifs,setNotifs]=useState(NOTIFS);
  const unread=notifs.filter(n=>!n.read).length;
  const markRead=()=>setNotifs(n=>n.map(x=>({...x,read:true})));
  const titles={home:['Overview','Welcome back, James'],browse:['Browse Orders','Find your next assignment'],
    'my-orders':['My Orders','Track your assignments'],earnings:['Earnings','Your payment history'],
    notifications:['Notifications','Stay up to date'],leaderboard:['Leaderboard','Writer rankings']};
  const [ti,sub]=titles[page]||['Dashboard',''];
  return (
    <div style={{display:'flex',height:'100%'}}>
      <Sidebar page={page} setPage={setPage} notifCount={unread}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar title={ti} subtitle={sub}/>
        {page==='home' && <HomePage setPage={setPage} setChat={setChat}/>}
        {page==='browse' && <BrowsePage setBid={setBid}/>}
        {page==='my-orders' && <MyOrdersPage setChat={setChat}/>}
        {page==='earnings' && <EarningsPage/>}
        {page==='notifications' && <NotificationsPage notifs={notifs} markRead={markRead}/>}
        {page==='leaderboard' && <LeaderboardPage/>}
      </div>
      {chat && <ChatPanel orderId={chat.id} orderTitle={chat.title} studentName={chat.student||'Jane A.'} onClose={()=>setChat(null)}/>}
      {bid && <BidModal order={bid} onClose={()=>setBid(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
